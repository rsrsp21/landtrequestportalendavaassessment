<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L&T Training Request Portal - Login</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-page="login">

<div class="toast-container" id="toastContainer"></div>

<div class="public-shell">
  <nav class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <img src="assets/logo/endava_logo_neg_RGB.png" alt="Endava" class="endava-logo-topbar" />
      </div>
      <div class="topbar-divider"></div>
      <span class="topbar-section">L&amp;T Training Portal</span>
    </div>
  </nav>

  <div id="view-login" class="view active">
    <div class="login-card">
      <div class="login-logo login-logo-tight">
        <img src="assets/logo/endava_logo_neg_RGB.png" alt="Endava" class="endava-logo-login" />
      </div>
      <div class="login-kicker-wrap">
        <div class="login-kicker">L&amp;T Training Portal</div>
      </div>
      <h2 class="login-heading">Welcome back</h2>
      <p class="login-sub">Sign in to manage your training requests</p>

      <div class="form-group">
        <label class="form-label" for="loginUsername">Username</label>
        <input class="form-input" type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" />
      </div>

      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>
    </div>
  </div>

  <footer class="public-footer">
    <p>(c) 2026 L&amp;T Training Portal</p>
  </footer>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/user-portal.js"></script>
<script src="assets/js/manager-portal.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
